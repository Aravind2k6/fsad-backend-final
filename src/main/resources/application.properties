spring.application.name=student-feedback-backend
server.port=${PORT:8080}

# ===========================
# MySQL DataSource
# ===========================
spring.datasource.url=${DB_URL:jdbc:mysql://shuttle.proxy.rlwy.net:34804/railway?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
